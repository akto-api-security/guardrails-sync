name: Sync Guardrails to Akto

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(atlas/*.json argus/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No guardrail files found. Exiting."
            exit 0
          fi

          seen_names=()
          for f in "${files[@]}"; do
            jq empty "$f" 2>/dev/null || { echo "❌ $f: invalid JSON"; exit 1; }

            name=$(basename "$f" .json)

            [[ " ${seen_names[*]} " == *" $name "* ]] && { echo "❌ Duplicate name: $name"; exit 1; }
            seen_names+=("$name")

            echo "✅ $f ($name)"
          done


      - name: Sync policies to Akto
        env:
          AKTO_API_URL:    ${{ secrets.AKTO_API_URL }}
          AKTO_API_KEY:    ${{ secrets.AKTO_API_KEY }}
        run: |
          set -uo pipefail
          shopt -s nullglob

          success=0; unchanged=0; failed=0
          failed_files=()

          sync_dir() {
            local dir="$1"
            local context_source="$2"

            for f in "$dir"/*.json; do
              name=$(basename "$f" .json)
              hash=$(sha256sum "$f" | awk '{print $1}')

              payload=$(jq \
                --arg n  "$name" \
                --arg h  "$hash" \
                --arg by "Github Workflow" \
                '{policy: (. + {name: $n, createdBy: $by, sourceHash: $h, source: "GITHUB_WORKFLOW"})}' "$f")

              echo "→ $name (hash: ${hash:0:12}...) [x-context-source: $context_source]"

              http_code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
                --retry 3 --retry-delay 2 --retry-all-errors \
                --max-time 30 \
                -X POST "$AKTO_API_URL/api/createGuardrailPolicy" \
                -H "Content-Type: application/json" \
                -H "X-Api-Key: $AKTO_API_KEY" \
                -H "x-context-source: $context_source" \
                --data-raw "$payload")

              body=$(cat /tmp/resp.txt)

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                status=$(echo "$body" | jq -r '.status // "ok"' 2>/dev/null || echo "ok")
                case "$status" in
                  unchanged) echo "  ⏭  unchanged"; unchanged=$((unchanged+1)) ;;
                  *)         echo "  ✅ synced";    success=$((success+1)) ;;
                esac
              else
                echo "  ❌ HTTP $http_code"
                echo "  $body"
                failed=$((failed+1))
                failed_files+=("$f")
              fi
              sleep 0.2
            done
          }

          sync_dir atlas ENDPOINT
          sync_dir argus AGENTIC

          echo ""
          echo "===== Summary ====="
          echo "✅ Synced:    $success"
          echo "⏭  Unchanged: $unchanged"
          echo "❌ Failed:    $failed"

          if [ "$failed" -gt 0 ]; then
            printf '  - %s\n' "${failed_files[@]}"
            exit 1
          fi
